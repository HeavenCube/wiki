input: .
output: .retype

url: https://heavencube.github.io/wiki/

start:
  pro: true

branding:
  title: HeavenCube
  label: Wiki
  # logo: assets/images/[LOGO À AJOUTER]
  # logoDark: assets/images/[LOGO SOMBRE À AJOUTER]

locale: fr

meta:
  title: " | Wiki HeavenCube"
  description: "Wiki officiel du serveur Minecraft HeavenCube : guides, commandes, fonctionnalités, règles et aide pour les joueurs."

links:
- text: Site officiel
  link: https://heavencube.fr
  target: blank
  icon: home

- text: Discord
  link: https://discord.heavencube.fr
  target: blank
  icon: comment-discussion

- text: Boutique
  link: https://heavencube.fr/boutique
  target: blank
  icon: gift

- text: GitHub
  link: https://github.com/HeavenCube/wiki
  target: blank
  icon: mark-github

footer:
  copyright: "&copy; Copyright {{ year }} HeavenCube. Tous droits réservés."
  links:
  - text: Site officiel
    link: https://heavencube.fr
    target: blank

lastUpdated:
  date:
    enabled: true
    source: committer
  by:
    enabled: true
    source: committer

breadcrumb:
  enabled: true

backlinks:
  enabled: true
  title: "Pages qui renvoient ici"
  maxResults: 8

toc:
  depth: 3

search:
  hotkeys:
  - "/"

actions:
  enabled: true

editor:
  enabled: true

hub:
  link: https://heavencube.fr
  target: blank

exclude:
- node_modules
- .git
- .github
- .retype

input: .
output: .retype

url: "https://heavenwiki.noltox.fr"
favicon: "assets/favicons/favicon.ico"

meta:
  title: " | HeavenCube"
  siteName: "HeavenCube"

branding:
  title: "HeavenCube"
  label: "v1"
  logo: "assets/logo/website-logo-compressed.webp"

links:
- text: "Getting Started"
  link: https://retype.com/guides/getting-started/

footer:
  copyright: "2021-{{ year }} [HeavenCube](https://heavencube.fr/) • Non associé à Mojang/Microsoft."
  links:
  - text: Site web
    link: "https://heavencube.fr"
    icon: check-circle
    title: "Retour au site web"

  - text: Règlements du serveur
    link: "https://heavencube.fr/reglements"
    icon: mortar-board
    title: "Toutes les règles du serveur à connaitre"

editor:
  enabled: false

locale:
  dateFormat: "dddd, MMMM d, yyyy"
  locale: "fr"

search:
  noResultsFoundMsg: "Aucun résultat trouvé"
  placeholder: "Rechercher..."
  preload: true

generator:
  directoryIndex:
    append: false

showSidebarFilter: false

actions:
  items:
  - text: Copier la page
    action: copy-page-markdown
    icon: copy
  - text: Copier le lien
    action: copy-page-link
    icon: link
  - type: separator
  - text: Afficher en Markdown
    action: view-page-markdown
    icon: markdown
  - text: Imprimer la page
    action: print-page
    icon: lucide-printer

lastUpdated:
  date:
    enabled: true
    source: committer
  by:
    enabled: true
    source: author

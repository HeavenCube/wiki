version: 2

updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "daily"
      time: "04:00"
      timezone: "Europe/Paris"

    open-pull-requests-limit: 20
    rebase-strategy: "auto"

    labels:
      - "dependencies"
      - "github-actions"
      - "documentation"

    commit-message:
      prefix: "deps(actions)"
      include: "scope"
